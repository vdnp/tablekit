name: Release

# Separate from ci.yml on purpose (ci.yml is left untouched). This runs only on
# pushes to main and drives the Changesets flow:
#   • changesets present  → open/update the "Version Packages" PR
#   • no changesets left   → publish the bumped packages to npm
on:
  push:
    branches: [main]

# Never cancel an in-flight release: cancelling mid-publish could leave some
# packages published and others not. Serialize instead.
concurrency:
  group: release
  cancel-in-progress: false

# Least privilege for what this workflow actually does:
permissions:
  contents: write # create the version-packages commit/PR and git tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # OIDC token for npm provenance attestations

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Changesets reads history/tags to compute status — needs full depth.
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # Re-run the FULL quality gate here rather than trusting that ci.yml was
      # green for this commit (defends against races and required-check gaps).
      # `pnpm test` is turbo-run: Vitest (core, react) AND Jest (react-native),
      # so a react-native test failure also blocks the release.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          # Named root scripts (unambiguous vs. arg-forwarding through `pnpm`):
          #   version-packages = changeset version  (bump + write CHANGELOGs)
          #   release          = turbo run build && changeset publish
          version: pnpm run version-packages
          # Runs only once no changesets remain (i.e. after the Version PR merges).
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's registry-url .npmrc reads NODE_AUTH_TOKEN for `npm publish`.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Emit npm provenance attestations (requires id-token: write + a public
          # repo whose URL matches each package's "repository" field).
          NPM_CONFIG_PROVENANCE: "true"
