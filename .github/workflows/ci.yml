name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref; newer pushes cancel older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build · Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the root package.json "packageManager" field;
      # do NOT also pass version here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm docs:check

  test-vitest:
    name: Unit tests (Vitest — core, react)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the root package.json "packageManager" field;
      # do NOT also pass version here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # turbo builds ^deps first (test dependsOn ^build).
      - run: pnpm exec turbo run test --filter=@vdnp/tablekit-core --filter=@vdnp/tablekit-react

  # Kept as a SEPARATE job from the Vitest one on purpose: @vdnp/tablekit-react-native
  # is the only package on Jest (RN's Flow source needs the react-native Jest
  # preset). Isolating it means a Jest failure can't be masked by — or mask — the
  # Vitest results, and vice versa. See CLAUDE.md → "Test strategy".
  test-react-native:
    name: Component tests (Jest — react-native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the root package.json "packageManager" field;
      # do NOT also pass version here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter=@vdnp/tablekit-react-native

  # SSR end-to-end: the Next.js example builds against the published packages.
  build-nextjs-example:
    name: Next.js example build (SSR e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the root package.json "packageManager" field;
      # do NOT also pass version here or action-setup errors on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Use turbo so the @vdnp/tablekit-* deps are built first (build dependsOn
      # ^build). `pnpm -F nextjs-app build` alone skips them, and `next build`
      # then fails with "Can't resolve @vdnp/tablekit-*" (no dist on a fresh runner).
      - run: pnpm exec turbo run build --filter=nextjs-app
