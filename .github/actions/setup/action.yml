# Composite action shared by release.yml (and any future workflow). The pnpm
# version is NOT passed here on purpose: it comes from the root package.json
# "packageManager" field. pnpm/action-setup@v4 errors ("Multiple versions of
# pnpm specified") if you set both `version:` here AND "packageManager" there,
# which failed every early run — so packageManager is the single source of truth.
name: Setup pnpm + Node
description: Install pnpm (from packageManager), Node 20 (with npm registry auth wired for publishing) and the workspace deps from a frozen lockfile.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
        # Writes an .npmrc pointing at npm and referencing NODE_AUTH_TOKEN, so
        # `changeset publish` can authenticate. No token is embedded here — the
        # value is injected at publish time from the NPM_TOKEN secret.
        registry-url: https://registry.npmjs.org
    - run: pnpm install --frozen-lockfile
      shell: bash
